<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>

    <filter id="roughen" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="turbulence" baseFrequency="0.025" numOctaves="4" seed="8" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3.5" xChannelSelector="R" yChannelSelector="G"/>
    </filter>

    <filter id="roughenHeavy" x="-8%" y="-8%" width="116%" height="116%">
      <feTurbulence type="turbulence" baseFrequency="0.018" numOctaves="3" seed="5" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="5.5" xChannelSelector="R" yChannelSelector="G"/>
    </filter>

  </defs>

  <!-- Dark background -->
  <rect width="200" height="200" fill="#0D0B0A"/>

  <!-- All gold strokes -->
  <g stroke="#C4922A" fill="none" stroke-linecap="round" stroke-linejoin="round">

    <!-- ===================== OUTER RING ===================== -->
    <g filter="url(#roughenHeavy)">
      <path d="M 100,23 C 144,21 179,57 178,101 C 177,146 141,179 98,177 C 55,176 21,140 22,98 C 23,56 57,25 100,23 Z"
            stroke-width="2.2" stroke-opacity="0.9"/>
      <path d="M 102,25 C 145,24 180,59 179,102 C 178,145 143,178 100,178 C 57,177 22,141 23,99 C 24,57 59,26 102,25 Z"
            stroke-width="0.8" stroke-opacity="0.35" stroke-dasharray="18,6,30,3,12,8"/>
    </g>

    <!-- ===================== RAYS ===================== -->
    <g filter="url(#roughen)">
      <!-- Top -->
      <path d="M 98 26 L 96 10 M 100 24 L 101 8 M 102 26 L 104 13" stroke-width="1.4" stroke-opacity="0.85"/>
      <!-- Top right -->
      <path d="M 142 46 L 153 35 M 145 49 L 157 39" stroke-width="1.3" stroke-opacity="0.75"/>
      <!-- Right -->
      <path d="M 175 97 L 192 95 M 175 101 L 191 102" stroke-width="1.3" stroke-opacity="0.7"/>
      <!-- Bottom right -->
      <path d="M 144 154 L 157 164 M 141 157 L 152 168" stroke-width="1.1" stroke-opacity="0.6"/>
      <!-- Top left -->
      <path d="M 58 46 L 47 35 M 55 49 L 43 39" stroke-width="1.3" stroke-opacity="0.75"/>
      <!-- Left -->
      <path d="M 25 97 L 8 95 M 25 101 L 9 102" stroke-width="1.2" stroke-opacity="0.65"/>
      <!-- Bottom left -->
      <path d="M 56 154 L 43 164 M 59 157 L 48 168" stroke-width="1.1" stroke-opacity="0.55"/>
      <!-- Bottom -->
      <path d="M 98 175 L 97 188 M 101 175 L 102 187" stroke-width="1.0" stroke-opacity="0.5"/>
    </g>

    <!-- ===================== HORIZON LINE ===================== -->
    <g filter="url(#roughen)">
      <path d="M 24 101 Q 55 99 100 101 Q 145 103 176 100" stroke-width="2.2"/>
      <path d="M 26 102 Q 60 100 100 102 Q 142 104 174 101" stroke-width="0.7" stroke-opacity="0.4"/>
    </g>

    <!-- ===================== DESCENDING LINE ===================== -->
    <g filter="url(#roughen)">
      <path d="M 100 101 Q 99 130 100 163" stroke-width="2.5"/>
      <path d="M 101 102 Q 102 131 101 162" stroke-width="0.8" stroke-opacity="0.4"/>
    </g>

    <!-- ===================== CRACKS ===================== -->
    <g filter="url(#roughen)" stroke-opacity="0.35" stroke-width="0.8">
      <path d="M 100 84 L 110 68 L 114 55"/>
      <path d="M 110 68 L 118 65" stroke-opacity="0.2"/>
      <path d="M 116 98 L 132 88 L 148 78"/>
      <path d="M 84 98 L 68 86 L 54 76"/>
      <path d="M 84 116 L 74 134 L 68 148"/>
      <path d="M 116 116 L 130 132 L 138 148"/>
    </g>

    <!-- ===================== RUNE SCRATCHES ===================== -->
    <g filter="url(#roughen)" stroke-opacity="0.4" stroke-width="1.0">
      <path d="M 55 55 L 57 62 M 58 53 L 58 61 M 56 58 L 62 57"/>
      <path d="M 63 47 L 67 50 M 65 45 L 62 52"/>
      <path d="M 141 53 L 139 60 M 143 51 L 143 59 M 140 57 L 146 56"/>
      <path d="M 135 47 L 131 50 M 133 45 L 136 52"/>
      <path d="M 82 170 L 83 163 M 86 172 L 87 164 M 80 168 L 89 167"/>
      <path d="M 115 170 L 114 163 M 111 172 L 110 164 M 113 168 L 122 167"/>
      <path d="M 163 72 L 157 74 M 165 76 L 158 78 M 162 75 L 161 82"/>
      <path d="M 37 72 L 43 74 M 35 76 L 42 78 M 38 75 L 39 82"/>
    </g>

    <!-- ===================== EYE ===================== -->
    <g filter="url(#roughen)">

      <!-- Outer eye shape -->
      <path d="M 74 101 Q 87 85 100 84 Q 113 85 127 101 Q 113 116 100 117 Q 87 116 74 101 Z"
            stroke-width="1.8" fill="#0D0B0A"/>
      <!-- Second sketch pass -->
      <path d="M 75 100 Q 88 84 100 83 Q 114 84 126 100 Q 114 117 100 118 Q 86 117 75 100 Z"
            stroke-width="0.6" stroke-opacity="0.35" stroke-dasharray="10,5"/>

      <!-- Iris circle -->
      <circle cx="100" cy="100" r="16" stroke-width="1.6" fill="#0D0B0A"/>
      <!-- Iris hatching — radiating scratches -->
      <g stroke-width="0.8" stroke-opacity="0.55">
        <line x1="100" y1="84" x2="100" y2="90"/>
        <line x1="108" y1="86" x2="105" y2="91"/>
        <line x1="114" y1="92" x2="109" y2="94"/>
        <line x1="116" y1="100" x2="110" y2="100"/>
        <line x1="114" y1="108" x2="109" y2="106"/>
        <line x1="108" y1="114" x2="105" y2="109"/>
        <line x1="100" y1="116" x2="100" y2="110"/>
        <line x1="92"  y1="114" x2="95"  y2="109"/>
        <line x1="86"  y1="108" x2="91"  y2="106"/>
        <line x1="84"  y1="100" x2="90"  y2="100"/>
        <line x1="86"  y1="92"  x2="91"  y2="94"/>
        <line x1="92"  y1="86"  x2="95"  y2="91"/>
      </g>

      <!-- Pupil — vertical slit, outlined in gold -->
      <path d="M 98 87 Q 94 100 98 113 Q 100 116 102 113 Q 106 100 102 87 Q 100 84 98 87 Z"
            stroke-width="1.4" fill="#0D0B0A"/>

      <!-- Eye veins -->
      <g stroke-width="0.8" stroke-opacity="0.45">
        <path d="M 75 100 Q 79 97 84 99"/>
        <path d="M 75 100 Q 80 103 85 101"/>
        <path d="M 125 100 Q 121 97 116 99"/>
        <path d="M 125 100 Q 120 103 115 101"/>
      </g>

      <!-- Glint -->
      <path d="M 95 94 Q 97 92 99 93 Q 98 95 96 95 Z" fill="#C4922A" stroke-width="0"/>

    </g>

  </g>

</svg>
