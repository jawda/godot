  <!-- Pupil slit -->
  <path d="M 11.2 9 Q 10.5 12 11.2 15 Q 12 15.8 12.8 15 Q 13.5 12 12.8 9 Q 12 8.2 11.2 9 Z"
        fill="#C4922A" stroke="none"/>

