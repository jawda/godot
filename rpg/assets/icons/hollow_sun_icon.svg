  <!-- Rays -->
  <line x1="12" y1="1"  x2="12" y2="3.5"  stroke="#C4922A" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="12" y1="20.5" x2="12" y2="23" stroke="#C4922A" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="1"  y1="12" x2="3.5"  y2="12" stroke="#C4922A" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="20.5" y1="12" x2="23" y2="12" stroke="#C4922A" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="3.8"  y1="3.8"  x2="5.6"  y2="5.6"  stroke="#C4922A" stroke-width="1.0" stroke-linecap="round"/>
  <line x1="20.2" y1="3.8"  x2="18.4" y2="5.6"  stroke="#C4922A" stroke-width="1.0" stroke-linecap="round"/>
  <line x1="3.8"  y1="20.2" x2="5.6"  y2="18.4" stroke="#C4922A" stroke-width="1.0" stroke-linecap="round"/>
  <line x1="20.2" y1="20.2" x2="18.4" y2="18.4" stroke="#C4922A" stroke-width="1.0" stroke-linecap="round"/>

